name: Daily AI/ML Fresher Job Search

on:
  schedule:
    # Runs at 3:30 AM UTC = 9:00 AM IST, every day
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job scraper
        run: python job_scraper.py

      - name: Commit and push updated CSV
        run: |
          git config user.name "job-radar-bot"
          git config user.email "actions@github.com"
          git add data/jobs.csv
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update jobs.csv $(date -u +'%Y-%m-%d')"
          git push
